<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' asset:; img-src 'self' asset: data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' asset: ws: http://localhost:*"
    />
    <title>DeskSoul · Character</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        user-select: none;
      }
      #stage {
        width: 100%;
        height: 100%;
      }
      #fallback {
        display: none;
        position: absolute;
        inset: 0;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-family: system-ui, sans-serif;
      }
      #fallback .face-disc {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #fallback .face {
        font-size: 88px;
        transition: transform 0.18s ease;
      }
      #fallback .face.pop {
        transform: scale(1.18);
      }
      #fallback .hud {
        font-family: ui-monospace, monospace;
        font-size: 11px;
        color: #555;
        background: rgba(255, 255, 255, 0.7);
        border-radius: 6px;
        padding: 1px 8px;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <div id="stage"></div>
    <div id="fallback"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
