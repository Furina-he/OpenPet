<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S4 · Character — Emotion Display</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, sans-serif;
        background: #16161c;
        color: #f0f0f0;
        overflow: hidden;
      }
      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        height: 100vh;
      }
      /* A stand-in for the VRM character (model is gitignored, not in repo). This
         spike validates the behavior channel drives the renderer live — the face
         reacts as tags arrive. S3 already proved real VRM BlendShape switching. */
      #face {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: #2a2a36;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 84px;
        transition:
          transform 0.4s ease,
          background 0.4s ease;
      }
      #emotion {
        font-family: ui-monospace, monospace;
        font-size: 14px;
        letter-spacing: 0.5px;
      }
      #intent {
        font-family: ui-monospace, monospace;
        font-size: 12px;
        color: #9aa;
        min-height: 16px;
      }
      #action {
        font-family: ui-monospace, monospace;
        font-size: 12px;
        color: #c9a;
        min-height: 16px;
      }
      .pop {
        transform: scale(1.12);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="face">😐</div>
      <div id="emotion">emotion: neutral</div>
      <div id="intent"></div>
      <div id="action"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
