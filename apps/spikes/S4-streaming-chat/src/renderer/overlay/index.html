<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S4 · UI Overlay (chat stream)</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, sans-serif;
        background: #f6f7fb;
        color: #15151a;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        padding: 16px;
        gap: 12px;
      }
      h2 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        color: #5b6472;
      }
      #bubble {
        flex: 1;
        overflow-y: auto;
        background: #fff;
        border: 1px solid #e3e6ee;
        border-radius: 12px;
        padding: 14px 16px;
        font-size: 15px;
        line-height: 1.7;
        white-space: pre-wrap;
        word-break: break-word;
      }
      #bubble .caret {
        display: inline-block;
        width: 7px;
        height: 1.1em;
        margin-left: 1px;
        vertical-align: text-bottom;
        background: #5b8def;
        animation: blink 1s steps(2) infinite;
      }
      @keyframes blink {
        0%,
        50% {
          opacity: 1;
        }
        50.01%,
        100% {
          opacity: 0;
        }
      }
      #meta {
        font-family: ui-monospace, monospace;
        font-size: 12px;
        color: #8a93a3;
        min-height: 1.4em;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      button {
        font-size: 14px;
        padding: 9px 18px;
        border-radius: 8px;
        border: 1px solid #cdd3df;
        background: #fff;
        cursor: pointer;
      }
      button:hover {
        background: #f0f3fa;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #send {
        background: #5b8def;
        border-color: #5b8def;
        color: #fff;
      }
      #send:hover {
        background: #4a7ce0;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h2>UI Overlay · chat.stream</h2>
      <div id="bubble"></div>
      <div id="meta"></div>
      <div class="row">
        <button id="send">发送 (chat.send)</button>
        <button id="cancel" disabled>取消 (chat.cancel)</button>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
