name: Release

# ⑪ 发布流水线：推送 v* tag → 构建 NSIS+portable → GitHub draft Release
# （electron-builder publish 配置 releaseType: draft；人工按发布门核对后 Publish，
#   此刻 latest.yml 生效、全端可见更新）。流程文档：internal/design/release-process.md。
on:
  push:
    tags: ['v*']

permissions:
  contents: write # electron-builder 创建 draft Release + 上传产物

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # 三段 build：protocol/sidecar dist → desktop（turbo ^build 扇出依赖顺序）
      - name: Build packages
        run: pnpm exec turbo run build --filter=@openpet/desktop

      # Electron ABI 的 better-sqlite3 落 native/（extraResources 带入安装包）
      - name: Fetch Electron sqlite binding
        run: node scripts/fetch-electron-sqlite.mjs
        working-directory: apps/desktop

      - name: Build installers & publish draft
        run: pnpm exec electron-builder --publish always
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify packaged deps closure
        run: node scripts/verify-packaged-deps.mjs
        working-directory: apps/desktop
