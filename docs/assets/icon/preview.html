<!doctype html>
<html><head><meta charset="utf-8"><style>
  body { margin:0; padding:32px; background:#ececec; font-family:sans-serif; display:flex; flex-direction:column; gap:24px; }
  .row { display:flex; align-items:flex-end; gap:24px; }
  .row img { image-rendering:auto; }
  .dark { background:#1f2937; padding:16px; border-radius:8px; display:flex; gap:24px; align-items:flex-end; width:fit-content; }
  .cell { text-align:center; font-size:11px; color:#666; }
  .dark .cell { color:#bbb; }
</style></head><body>
  <div class="row">
    <div class="cell"><img src="openpet-icon.svg" width="256"><br>256</div>
    <div class="cell"><img src="openpet-icon.svg" width="48"><br>48</div>
    <div class="cell"><img src="openpet-icon.svg" width="32"><br>32</div>
    <div class="cell"><img src="openpet-icon.svg" width="24"><br>24</div>
    <div class="cell"><img src="openpet-icon.svg" width="16"><br>16</div>
  </div>
  <div class="dark">
    <div class="cell"><img src="openpet-tray.svg" width="32"><br>tray 32</div>
    <div class="cell"><img src="openpet-tray.svg" width="16"><br>tray 16</div>
  </div>
</body></html>
